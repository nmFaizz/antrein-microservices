global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'menu-preorder-service'
    static_configs:
      - targets: ['menu-preorder-service:8000']
    metrics_path: /metrics

  - job_name: 'queue-service'
    static_configs:
      - targets: ['queue-service:8000']
    metrics_path: /metrics

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8000']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
