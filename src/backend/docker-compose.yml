services:

  nginx:
    image: nginx:alpine
    ports:
      - "8080:9090"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - menu-preorder-service
      - queue-service

  user-service:
    build: ./user-service
    ports:
      - "8002:8000"
    environment:
      - USER_DB_HOST=user-db
      - USER_DB_PORT=${USER_DB_PORT}
      - USER_DB_NAME=${USER_DB_NAME}
      - USER_DB_USER=${USER_DB_USER}
      - USER_DB_PASSWORD=${USER_DB_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}  
    depends_on:
      user-db:
        condition: service_healthy

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
      PGPORT: ${USER_DB_PORT}
    ports:
      - "${USER_DB_PORT}:${USER_DB_PORT}"
    volumes:
      - user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${USER_DB_PORT} -U ${USER_DB_USER} -d ${USER_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  menu-preorder-service:
    build: ./menu-preorder-service
    ports:
      - "8000:8000"
    environment:
      - MENU_PREORDER_DB_HOST=${MENU_PREORDER_DB_HOST}
      - MENU_PREORDER_DB_PORT=${MENU_PREORDER_DB_PORT}
      - MENU_PREORDER_DB_NAME=${MENU_PREORDER_DB_NAME}
      - MENU_PREORDER_DB_USER=${MENU_PREORDER_DB_USER}
      - MENU_PREORDER_DB_PASSWORD=${MENU_PREORDER_DB_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      menu-preorder-db:
        condition: service_healthy
  
  menu-preorder-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${MENU_PREORDER_DB_USER}
      POSTGRES_PASSWORD: ${MENU_PREORDER_DB_PASSWORD}
      POSTGRES_DB: ${MENU_PREORDER_DB_NAME}
      PGPORT: ${MENU_PREORDER_DB_PORT}
    ports:
      - "${MENU_PREORDER_DB_PORT}:${MENU_PREORDER_DB_PORT}"
    volumes:
      - menu_preorder_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${MENU_PREORDER_DB_PORT} -U ${MENU_PREORDER_DB_USER} -d ${MENU_PREORDER_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  queue-service:
    build: ./queue-service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://${QUEUE_DB_USER}:${QUEUE_DB_PASSWORD}@queue-service-db:5432/${QUEUE_DB_NAME}
      OTEL_SERVICE_NAME: "Queue Service"
      ENV: "development"
      SERVICE_VERSION: "1.0.0"
      # OTEL_EXPORTER_OTLP_ENDPOINT / LOKI_URL use code defaults (jaeger:4318, loki:3100)
    depends_on:
      queue-service-db:
        condition: service_healthy

  queue-service-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${QUEUE_DB_USER}
      POSTGRES_PASSWORD: ${QUEUE_DB_PASSWORD}
      POSTGRES_DB: ${QUEUE_DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - queue_service_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${QUEUE_DB_USER} -d ${QUEUE_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus, loki, jaeger]

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  loki:
    image: grafana/loki:2.9.0
    ports: ["3100:3100"]
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yml:ro

volumes:
  user_data:
  menu_preorder_data:
  queue_service_data:
  