services:
  menu-preorder-service:
    build: ./menu-preorder-service
    ports:
      - "8000:8000"
    environment:
      DB_HOST: ${MENU_PREORDER_DB_HOST}
      DB_PORT: ${MENU_PREORDER_DB_PORT}
      DB_NAME: ${MENU_PREORDER_DB_NAME}
      DB_USER: ${MENU_PREORDER_DB_USER}
      DB_PASSWORD: ${MENU_PREORDER_DB_PASSWORD}
    depends_on:
      menu-preorder-db:
        condition: service_healthy
  
  menu-preorder-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${MENU_PREORDER_DB_USER}
      POSTGRES_PASSWORD: ${MENU_PREORDER_DB_PASSWORD}
      POSTGRES_DB: ${MENU_PREORDER_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - menu_preorder_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MENU_PREORDER_DB_USER} -d ${MENU_PREORDER_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  menu_preorder_data: